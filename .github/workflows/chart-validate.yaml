name: Validate Helm Chart

on:
  pull_request:
    paths:
      - 'charts/**'
      - '.github/workflows/chart-validate.yaml'
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/workflows/chart-validate.yaml'

jobs:
  lint-and-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4

      - uses: helm/chart-testing-action@v2.6.1

      - name: Lint changed charts
        run: ct lint --target-branch main --all

      - name: Render chart with each scenario
        run: |
          set -e

          echo "::group::values-test.yaml (bundled postgres)"
          helm template netdisco charts/netdisco \
            -f charts/netdisco/values-test.yaml > /dev/null
          echo "::endgroup::"

          echo "::group::values-openshift.yaml (external postgres)"
          helm template netdisco charts/netdisco \
            -f charts/netdisco/values-openshift.yaml > /dev/null
          echo "::endgroup::"

          echo "::group::values-openshift.yaml + values-vault-eso.yaml (overlay)"
          helm template netdisco charts/netdisco \
            -f charts/netdisco/values-openshift.yaml \
            -f charts/netdisco/values-vault-eso.yaml > /dev/null
          echo "::endgroup::"

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate rendered manifests with kubeconform
        run: |
          set -e

          echo "::group::kubeconform: values-test.yaml"
          helm template netdisco charts/netdisco \
            -f charts/netdisco/values-test.yaml \
            | kubeconform -strict -ignore-missing-schemas -summary
          echo "::endgroup::"

          echo "::group::kubeconform: values-openshift.yaml"
          helm template netdisco charts/netdisco \
            -f charts/netdisco/values-openshift.yaml \
            | kubeconform -strict -ignore-missing-schemas -summary
          echo "::endgroup::"

          echo "::group::kubeconform: openshift + vault-eso overlay"
          helm template netdisco charts/netdisco \
            -f charts/netdisco/values-openshift.yaml \
            -f charts/netdisco/values-vault-eso.yaml \
            | kubeconform -strict -ignore-missing-schemas -summary
          echo "::endgroup::"
